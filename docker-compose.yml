# version: '3.9' (Obsolete in v2)

services:
  db:
    image: postgres:16-alpine
    container_name: aipcore_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aipcore_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aipcore_net

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: aipcore_backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aipcore_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aipcore_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - aipcore_net

volumes:
  postgres_data:
    driver: local

networks:
  aipcore_net:
    driver: bridge
